/* ══ TOKENS — Light only, Ole's palette ══ */
:root{
  color-scheme: light;
  --navy:  #0D1B2E;
  --blue:  #4A90C4;
  --primary: #1E6CB0;
  --gold:  #B8832A;
  --sand:  #F0EAE0;
  --cream: #FAFAF7;
  --white: #FFFFFF;
  --l1:    #0D1B2E;
  --l2:    rgba(13,27,46,.64);
  --l3:    rgba(13,27,46,.44);
  --l4:    rgba(13,27,46,.28);
  --sep:   rgba(13,27,46,.08);
  --fill:  rgba(13,27,46,.05);
  --fill2: rgba(13,27,46,.09);
  --tint:  #B8832A;
  --red:   #C03030;
  --grn:   #1A6640;
  --cat-rest:#D9731E;--cat-cafe:#8B2E2E;--cat-spa:#1A6640;
  --cat-rad:#2260A8;--cat-str:#1499A0;--cat-ein:#685820;
  --serif: "New York",ui-serif,Georgia,serif;
  --sans:  -apple-system,"SF Pro Text",BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  --r:     24px;
  --rlg:   26px;
  --rp:    100px;
  --ph:    16px;
  --btnh:  44px;
  --btnr:  22px;
  --btnfs: 14px;
  --blur:  blur(34px) saturate(190%);
  --spring:cubic-bezier(0.32,0.72,0,1);
  /* Apple App Store style card shadow */
  --sh: 0 1px 3px rgba(13,27,46,.05), 0 4px 14px rgba(13,27,46,.07), 0 10px 28px rgba(13,27,46,.06);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--navy);overscroll-behavior-y:none}
body{background:var(--sand);min-height:100vh;overflow-x:hidden;overscroll-behavior-y:none}
body.sheet-open{overflow:hidden;position:fixed;width:100%}
body{font-family:var(--sans);background:var(--sand);color:var(--l1);-webkit-font-smoothing:antialiased;overscroll-behavior:none;color-scheme:light}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}
svg{display:block;flex-shrink:0}
input{font:inherit;color:inherit;background:none;border:none;outline:none}

#shell{display:flex;flex-direction:column;min-height:100vh}

/* ══ NAV — Navy background with Ole's palette ══ */
#safe-top{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top,0px);background:var(--navy);z-index:200}
#nav{flex:none;z-index:100;
  margin-top:env(safe-area-inset-top,0px);
  padding:10px var(--ph) 10px;
  background:var(--navy);
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:space-between;
  max-height:80px;overflow:hidden;will-change:max-height,opacity;
  transition:max-height .28s var(--spring),opacity .18s ease,padding .28s var(--spring),border-color .25s ease}
#nav.collapsed{max-height:0;opacity:0;padding-top:0;padding-bottom:0;border-bottom-color:transparent}
#nav-title-wrap{display:flex;align-items:baseline;gap:7px}
#nav-title-main{font-family:var(--serif);font-weight:700;color:var(--white);
  font-size:24px;letter-spacing:0px;line-height:1;
  transition:font-size .15s ease,letter-spacing .15s ease}
#nav-title-year{font-family:var(--sans);font-weight:400;color:rgba(255,255,255,.5);
  font-size:14px;letter-spacing:.4px;line-height:1;
  transition:font-size .15s ease,opacity .15s ease}
#pw{display:flex;align-items:center;gap:7px}
#pc{font-size:12px;font-weight:600;color:var(--gold)}
@keyframes badgePulse{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
.badge-pulse{animation:badgePulse .3s ease;display:inline-block}
#prs{transform:rotate(-90deg)}
#prb{fill:none;stroke:rgba(255,255,255,.15);stroke-width:2}
#prr{fill:none;stroke:var(--gold);stroke-width:2.2;stroke-linecap:round;
  stroke-dasharray:69.12;stroke-dashoffset:69.12;transition:stroke-dashoffset .6s ease}
#sync-dot{display:none!important}

#sc{flex:1}

/* ══ TABS — White with navy active ══ */
#tabs{position:fixed;bottom:0;left:0;right:0;height:calc(49px + env(safe-area-inset-bottom,0px) - 6px);
  padding-bottom:calc(env(safe-area-inset-bottom,0px) - 6px);display:flex;
  background:rgba(250,250,247,.96);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-top:.5px solid var(--sep);z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--l4);transition:color .15s;padding:10px 0 4px;
  font-size:11px;font-weight:600;letter-spacing:.2px;min-height:44px}
.tab.on{color:var(--navy)}

/* ══ DISCOVER HEADER ══ */
#dhdr{position:sticky;top:env(safe-area-inset-top,0px);z-index:50;
  background:rgba(240,234,224,.82);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
#dhdr::after{content:'';position:absolute;left:0;right:0;bottom:-18px;height:18px;
  background:linear-gradient(to bottom,rgba(240,234,224,.55),rgba(240,234,224,0));
  pointer-events:none}

/* Search — the icon itself morphs into the search bar, same row height always */
#sbar{display:flex;align-items:center;gap:0;
  flex:0 0 32px;height:32px;border-radius:10px;
  background:none;overflow:hidden;
  transition:flex-grow .22s ease,background .2s ease,padding .2s ease}
#sbar.open{flex:1 1 32px;background:var(--fill2);gap:6px;padding:0 6px 0 2px;margin-right:var(--ph)}
#sinput{flex:0;width:0;min-width:0;font-size:15px;caret-color:var(--tint);
  opacity:0;transition:flex .2s ease,opacity .15s ease}
#sbar.open #sinput{flex:1;width:auto;opacity:1}
#sinput::placeholder{color:var(--l2)}
#sclr{flex:none;width:0;overflow:hidden;color:var(--l2);opacity:0;
  transition:width .15s ease,opacity .15s ease}
#sclr.vis{width:18px;opacity:1}

/* Filter row + search toggle */
#fr-outer{display:flex;align-items:center;padding:10px 0 10px var(--ph);gap:0}
#sbar{margin-right:10px}
#sbar.open + .fr-divider{display:none}
.search-toggle-btn{flex:none;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:none;color:var(--l4);transition:color .14s}
#sbar.open .search-toggle-btn{color:var(--navy)}
.search-toggle-btn:active{opacity:.6}
.fr-divider{flex:none;width:1px;height:32px;flex-shrink:0;background:var(--sep)}
#frow{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1;height:32px;
  padding-left:8px;padding-right:var(--ph);
  -webkit-mask-image:linear-gradient(to right,transparent 0px,black 8px);
  mask-image:linear-gradient(to right,transparent 0px,black 8px)}
#frow.hidden{display:none}
#frow::-webkit-scrollbar{display:none}
.chip{flex:none;padding:6px 13px;border-radius:var(--rp);background:var(--fill2);
  font-size:12px;font-weight:500;color:var(--l3);white-space:nowrap;
  min-height:32px;display:flex;align-items:center;gap:5px;
  transition:background .14s,color .14s}
.chip:active{opacity:.65}
.chip.on{background:var(--navy);color:var(--white)}
.chip-rain.on{background:var(--blue);color:var(--white)}
.chip-hl.on{background:var(--gold);color:var(--white)}
.chip-x{font-size:17px;line-height:1;font-weight:400;opacity:.8;padding:0 1px}
.chip-x:active{opacity:.45}
#filterbtn{flex:none;display:flex;align-items:center;gap:4px;padding:6px 12px;
  border-radius:var(--rp);border:1.5px solid var(--sep);min-height:32px;
  font-size:12px;font-weight:500;color:var(--l2);
  transition:border-color .14s,color .14s}
#filterbtn.active{border-color:var(--tint);color:var(--tint)}
#filterbtn:active{opacity:.65}
#fbadges{display:none;padding:0 var(--ph) 8px;gap:6px;flex-wrap:wrap}
#fbadges.vis{display:flex}
.fbadge{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:var(--rp);
  background:rgba(184,131,42,.12);color:var(--tint);display:flex;align-items:center;gap:4px}
.fbadge button{font-size:14px;color:var(--tint)}

/* Empty states */
.empty-state{padding:48px 24px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center}
.empty-state svg{color:var(--l4)}
.es-t{font-size:16px;font-weight:600;color:var(--l2)}
.es-s{font-size:14px;color:var(--l3);line-height:1.55;max-width:220px}

/* ══ PLACE LIST ══ */
#pl{padding:12px var(--ph) calc(70px + env(safe-area-inset-bottom,0px))}


@keyframes checkPop{0%{transform:scale(1)}45%{transform:scale(1.45)}75%{transform:scale(.92)}100%{transform:scale(1)}}
.check-pop{animation:checkPop .32s cubic-bezier(0.34,1.56,0.64,1)}
.card{transition:transform .42s var(--spring),opacity .3s ease}
/* ══ CARD WRAPPER ══ */
.cw{position:relative;margin-bottom:12px}

/* ══ CARD — shadow, border-radius, overflow:hidden ══ */
.card{background:var(--white);border-radius:var(--r);overflow:hidden;
  position:relative;z-index:1;
  box-shadow:var(--sh);
  transform:translateX(0);will-change:transform;
  transition:transform .42s var(--spring)}

/* ══ COMPACT HEADER ══ */
.cc{display:flex;gap:10px;padding:13px 0 11px 14px;cursor:pointer;
  user-select:none;-webkit-user-select:none;transition:background .1s}
.cc:active{background:rgba(13,27,46,.03)}
.cc-left{flex:1;min-width:0}

/* Meta row: cat-chip + location(region) + highlight star */
.cc-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:5px}
/* Category chip — replaces dot, directly readable */
.cat-chip{font-size:11px;font-weight:700;padding:2px 9px;border-radius:var(--rp);letter-spacing:.2px}
.ch-restaurant{background:rgba(217,115,30,.12);color:var(--cat-rest)}
.ch-cafe{background:rgba(139,46,46,.1);color:var(--cat-cafe)}
.ch-spaziergang{background:rgba(26,102,64,.1);color:var(--cat-spa)}
.ch-radtour{background:rgba(34,96,168,.1);color:var(--cat-rad)}
.ch-strand{background:rgba(20,153,160,.1);color:var(--cat-str)}
.ch-einkaufen{background:rgba(104,88,32,.1);color:var(--cat-ein)}
/* Transport badges */
.tr-b{display:inline-flex;align-items:center;font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:var(--rp);flex-shrink:0}
.tr-fuss{background:rgba(26,102,64,.1);color:var(--cat-spa)}
.tr-rad{background:rgba(34,96,168,.1);color:var(--cat-rad)}
.tr-bus{background:rgba(74,144,196,.1);color:var(--blue)}
.tr-re{background:rgba(236,0,22,.1);color:#CC0012;font-weight:700}
/* Location + region combined text */
.loc-label{font-size:11px;font-weight:400;color:var(--l3)}
/* Highlight star pill — icon only */
.hl-pill{width:18px;height:18px;border-radius:50%;background:rgba(184,131,42,.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold)}
/* Assigned badge */
.asgn-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:var(--rp);
  background:var(--fill2);color:var(--l2)}

/* Card name */
.cc-name{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--l1);
  line-height:1.2;margin-bottom:3px}
/* Short descriptive subtitle — Regular, not italic, max 2 lines */
.cc-sub{font-size:13px;font-weight:400;color:var(--l2);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Right side: single + button, icon only — gray, static, no hover */
.cc-right{display:flex;align-items:center;flex-shrink:0;padding-top:2px;padding-right:8px}
.act-plus{width:44px;height:44px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  background:none;color:var(--l4);flex-shrink:0}

/* ══ CARD DETAIL — grid animation ══ */
.cd{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s ease}
.cw.open .cd{grid-template-rows:1fr}
.cd-inner{overflow:hidden}

/* Feel text — the one remaining detail copy: warm, personal, gold left border */
.c-feel{margin:2px 14px 12px;padding:9px 12px;
  border-left:2.5px solid var(--gold);
  background:rgba(184,131,42,.04);
  border-radius:0 8px 8px 0;
  font-size:14px;font-weight:400;color:var(--l2);line-height:1.6}

/* Apple Settings-style info list: stacked label/value rows */
.info-list{margin:0 14px 10px;border-top:.5px solid var(--sep)}
.info-row{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 0;border-bottom:.5px solid var(--sep)}
.info-label{font-size:12px;color:var(--l3);font-weight:400;flex-shrink:0}
.info-value{font-size:13px;color:var(--l1);font-weight:500;text-align:right}
.pipe-sep{font-weight:500}

.c-ts{padding:0 14px 8px;font-size:11px;font-weight:400;color:var(--l3)}

/* Detail actions — Maps primary navy, Phone secondary blue */
.c-det-acts{display:flex;gap:8px;padding:8px 14px 14px;margin-top:2px}
.det-act{flex:1;min-width:0}
.det-act.det-ico{flex:0 0 calc((100% - 24px)/4.6);min-width:0;padding:0}
.det-act.det-ico2{flex:0 0 calc(25% - 6px);min-width:0;padding:0}
.det-act{display:flex;align-items:center;gap:5px;padding:0 10px;height:var(--btnh);border-radius:var(--btnr);white-space:nowrap;
  font-size:var(--btnfs);font-weight:600;transition:opacity .12s,transform .1s;flex:1;justify-content:center}
.det-act:active{opacity:.82;transform:scale(.98)}
.det-maps{color:#fff;background:var(--primary)}
.det-phone{color:#1FA04A;background:#E3F7E8}
.det-google{color:#fff;background:var(--primary)}
.det-web,.det-maps2{color:var(--blue);background:#E8F1F7}
.hotel-section .det-web{border:none;background:rgba(255,255,255,.82)}
.hotel-section .det-phone{border:none;background:rgba(255,255,255,.82)}

/* ══ PLAN VIEW ══ */
#plan{padding:20px var(--ph) calc(70px + env(safe-area-inset-bottom,0px))}
.dg{margin-bottom:28px}
.dt{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:baseline;gap:6px}
.dm{font-size:13px;color:var(--l2)}

/* Jahrestag: minimal — just a small red heart inline, no box */
.dt-heart{color:var(--red);font-size:15px;margin-left:2px}
.dt-hint{font-size:12.5px;color:var(--l2);margin-top:2px;font-weight:400}

.dslots{background:var(--white);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.d-empty{display:none}/* replaced by plan-empty-card */
.plan-empty-card{display:flex;align-items:center;padding:0 14px;min-height:50px;
  color:var(--l3);font-size:13px;font-weight:400}
.pr-fixed{display:flex;align-items:center;gap:8px;padding:11px 12px 11px 14px;min-height:50px;
  border-top:.5px solid var(--sep)}
.pr-fixed-time{width:50px;flex-shrink:0;font-size:13px;font-weight:600;color:var(--l2)}
.pr-fixed-title{font-size:13px;color:var(--l2);font-style:normal;font-weight:400}
.d-empty svg{color:var(--l4)}
.de-t{font-size:14px;font-weight:500;color:var(--l2)}
.de-s{font-size:13px;font-weight:400;color:var(--l3);line-height:1.5;max-width:240px}

/* ══ TOUREN TAB ══ */
#touren{padding:14px var(--ph) calc(70px + env(safe-area-inset-bottom,0px))}
.tour-card{background:var(--white);border-radius:var(--r);box-shadow:var(--sh);
  padding:14px 15px;margin-bottom:12px}
.tour-name{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--l1);margin-top:6px}
.tour-subline{font-size:13px;font-weight:400;color:var(--l2);margin-top:2px;margin-bottom:10px}
.tour-sub{font-size:14px;font-weight:400;color:var(--l2);line-height:1.6;margin-bottom:10px}
.tour-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tour-pipe{font-size:13px;font-weight:400;color:var(--l3)}
.tour-meta-text{font-size:13px;font-weight:400;color:var(--l2)}
.tour-timeline{margin-bottom:14px}
.tl-item{display:flex;align-items:stretch;gap:10px}
.tl-left{display:flex;flex-direction:column;align-items:center;width:18px;flex-shrink:0}
.tl-line-top,.tl-line-bottom{flex:1;width:1px;background:var(--sep);min-height:6px}
  .tl-line-top{margin-bottom:4px}
  .tl-line-bottom{margin-top:4px}
.tour-subline{font-size:13px;font-weight:500;color:var(--l2);margin-top:2px}
.tl-dot{width:6px;height:6px;border-radius:50%;background:var(--l3);flex-shrink:0}
.tl-item:first-child .tl-line-top{visibility:hidden}
.tl-item:last-child .tl-line-bottom{visibility:hidden}
/* Right side wrapper — divider starts here (at text level) */
.tl-right{flex:1;display:flex;align-items:center;gap:6px;
  border-top:.5px solid var(--sep);padding:11px 0}
.tl-item:first-child .tl-right{border-top:none;padding-top:8px}
.tl-item:last-child .tl-right{padding-bottom:8px}
.tl-name{font-size:14px;font-weight:600;color:var(--l1);flex:1}
.tl-cat{font-size:11.5px;font-weight:400;color:var(--l3);vertical-align:baseline}
.tl-info-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:rgba(13,27,46,.28);background:none;flex-shrink:0}
.tl-info-btn:active{opacity:.4}
/* plan section header in discover */
.plan-divider{height:.5px;background:var(--sep);margin:22px 10px 22px}
/* Hotel pin card at top of Orte */
.hotel-section{padding:10px 8px 0 10px;margin-bottom:0}
.hotel-section-name{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--l1);margin-bottom:2px}
.hotel-section-addr{font-size:13px;font-weight:400;color:var(--l2);margin-bottom:0}
.hotel-section-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.hotel-section-chev{color:var(--l4);transition:transform .25s ease;flex-shrink:0;margin-right:13px}
.hotel-section.open .hotel-section-chev{transform:rotate(-90deg)}
.hotel-section-acts{display:none;gap:8px;margin-top:12px;margin-bottom:0}
.hotel-section.open .hotel-section-acts{display:flex}
.hotel-section-sep{height:.5px;background:var(--sep);margin:16px 0}
.tour-place-chip{font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:var(--rp);
  background:var(--fill);color:var(--l1)}
.tour-btn{width:100%;height:var(--btnh);display:flex;align-items:center;justify-content:center;gap:6px;border-radius:var(--btnr);background:var(--primary);color:#fff;
  font-size:var(--btnfs);font-weight:600;transition:opacity .14s}
.tour-btn:active{opacity:.8}
.tour-btn.done{background:var(--fill);color:var(--grn);display:flex;align-items:center;justify-content:center;gap:6px}
.tour-card.done{opacity:.62}
.tour-card{transition:opacity .3s ease}

.pr{display:flex;align-items:center;gap:14px;padding:11px 12px 11px 14px;min-height:50px;
  border-top:.5px solid var(--sep);transition:background .1s,opacity .2s}
.pr{transition:transform .28s var(--spring)}
.pr.dragging-row{background:var(--fill);box-shadow:0 6px 18px rgba(0,0,0,.16);border-radius:10px;transform:scale(1.03)}

.pr-time-btn{flex:none;width:46px;text-align:left;font-size:13px;font-weight:500;
  color:var(--navy);background:none;padding:4px 0;
  font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.pr-time-btn.unset{color:var(--l4);font-weight:400}
.pr-time-btn:active{opacity:.6}

.pr-mid{flex:1;min-width:0;cursor:pointer}
.pr-mid-title{font-size:13px;font-weight:600;color:var(--l1);line-height:1.3}
.pr.done .pr-mid-title{text-decoration:line-through;color:var(--l2)}

.pr-right{display:flex;align-items:center;gap:2px;flex-shrink:0}

/* Plan row swipe-to-delete */
.pr-wrap{position:relative;overflow:hidden}
.pr-behind{position:absolute;top:0;bottom:0;right:0;width:72px;background:var(--red);
  display:flex;align-items:center;justify-content:center;pointer-events:none}
.pr-behind-btn{width:20px;height:20px;border-radius:50%;background:#fff;
  display:flex;align-items:center;justify-content:center;color:var(--red);pointer-events:none}
.pr-type{font-size:12px;font-weight:400;color:var(--l3)}
/* i-button: same color as drag handle */
.pr-remove{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:none;color:var(--l4);display:flex;align-items:center;justify-content:center;
  transition:opacity .12s}
.pr-remove:active{opacity:.4}
.pr-handle{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  color:var(--l4);touch-action:none}

/* Time input overlaid on time button for direct iOS picker */
.pr-time-wrap{position:relative;width:46px;flex-shrink:0;display:flex;align-items:center}
.pr-time-hidden{position:absolute;inset:0;width:100%;height:100%;opacity:0;
  font-size:16px;cursor:pointer;color-scheme:light;border:none;background:none}

.jt-note{padding:10px 14px;border-top:.5px solid var(--sep);font-size:13px;color:var(--l2);
  line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.jt-note svg{color:var(--gold);flex-shrink:0;margin-top:2px}

.view{display:none}
.view.on{display:block;animation:viewIn .16s ease}
@keyframes viewIn{from{opacity:0}to{opacity:1}}

/* ══ SHEETS ══ */
#ov,#fov,#tov,#iov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0);
  transition:background .28s;display:flex;align-items:flex-end;justify-content:center;pointer-events:none}
#ov.on,#fov.on,#tov.on,#iov.on{background:rgba(0,0,0,.48);pointer-events:all}
.sheet{width:100%;max-width:430px;background:var(--white);
  border-radius:var(--rlg) var(--rlg) 0 0;
  padding:8px var(--ph) calc(24px + env(safe-area-inset-bottom,0px));
  max-height:82vh;overflow-y:auto;touch-action:pan-y;overscroll-behavior:contain;
  transform:translateY(100%);transition:transform .46s var(--spring);will-change:transform;
  position:relative;box-shadow:0 15vh 0 0 var(--white),0 30vh 0 0 var(--white),0 45vh 0 0 var(--white),0 60vh 0 0 var(--white)}

#ov.on .sheet,#fov.on .sheet,#tov.on .sheet,#iov.on .sheet{transform:translateY(0)}
.sheet.dragging{transition:none}
.sdl{width:36px;height:5px;border-radius:3px;background:var(--fill2);margin:0 auto 18px}
.shn{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:18px}
#iov-sheet .shn{margin-left:14px}
.ssec{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--l3);margin-bottom:8px}
.ssec-opt{font-weight:400;text-transform:none;letter-spacing:0;color:var(--l3);font-size:11px}
.dprow{display:flex;overflow-x:auto;gap:8px;padding-bottom:4px;margin-bottom:16px;touch-action:pan-x;
  scrollbar-width:none;
  margin-left:calc(-1 * var(--ph));margin-right:calc(-1 * var(--ph));
  padding-left:var(--ph);padding-right:var(--ph)}
.dprow::-webkit-scrollbar{display:none}
.prow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.fsec-hd{font-family:var(--serif);font-size:17px;font-weight:700;margin-bottom:10px}
#fov-sheet .shn,#fov-sheet .fsec-hd{font-family:var(--sans)}
.fsep{height:.5px;background:var(--sep);margin:16px 0}
.pbtn{padding:8px 16px;border-radius:var(--rp);background:var(--fill2);
  font-size:14px;font-weight:500;color:var(--l1);flex:none;
  min-height:44px;display:flex;align-items:center;transition:background .14s,color .14s}
.pbtn:active{opacity:.65}
.pbtn.on{background:var(--navy);color:var(--white)}
.pbtn.sp{color:var(--l1)}.pbtn.sp.on{background:var(--navy);color:#fff}

/* Time picker — compact inline tap-target */
.time-picker-row{display:flex;align-items:center;justify-content:space-between;
  background:var(--fill);border-radius:12px;padding:2px 4px 2px 10px;
  margin-bottom:18px;min-height:44px}
.time-native{font-size:17px;font-weight:500;color:var(--navy);
  background:none;border:none;font-family:var(--sans);
  padding:8px 4px;color-scheme:light;flex:1}
.time-native::-webkit-date-and-time-value{text-align:left}
.time-clear-btn{font-size:13px;font-weight:600;color:var(--l2);background:none;padding:8px 10px;flex:none}
.time-clear-btn:active{opacity:.55}

/* Buttons — side by side, regular weight */
.sacts-row{display:flex;gap:10px;margin-top:4px}
#bca,#fca{flex:1;height:var(--btnh);display:flex;align-items:center;justify-content:center;border-radius:var(--btnr);background:var(--fill);
  font-size:var(--btnfs);font-weight:600;color:var(--l1);transition:opacity .14s}
#ba,#fapply{flex:1;height:var(--btnh);display:flex;align-items:center;justify-content:center;border-radius:var(--btnr);background:var(--primary);
  font-size:var(--btnfs);font-weight:600;color:var(--white);transition:opacity .14s}
#bca:active,#fca:active{opacity:.6}
#ba:active,#fapply:active{opacity:.8}
#br{display:block;width:100%;text-align:center;background:none;
  color:var(--red);font-size:13px;font-weight:600;padding:4px 0 16px}
#br:active{opacity:.55}
#ov.time-only #ov-tag-label,#ov.time-only #dp{display:none}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important}
  .sheet{transition:opacity .2s ease!important;transform:none!important}
  #ov.on .sheet,#fov.on .sheet,#tov.on .sheet,#iov.on .sheet{transform:none!important}
  #prr{transition:none!important}
}
</style>
</head>
<body>
<div id="shell">
  <div id="safe-top"></div>
  <header id="nav">
    <div id="nav-title-wrap">
      <span id="nav-title-main">SYLT</span><span id="nav-title-year">2026</span>
    </div>
    <div id="pw">
      <div id="pc">0 / 34</div>
      <div id="sync-dot"></div>
      <svg id="prs" width="28" height="28" viewBox="0 0 24 24">
        <circle id="prb" cx="12" cy="12" r="11"/>
        <circle id="prr" cx="12" cy="12" r="11"/>
      </svg>
    </div>
  </header>
  <div id="sc">
    <div class="view on" id="view-discover">
      <div id="dhdr">
        <div id="fr-outer">
          <div id="sbar">
            <button id="search-toggle" class="search-toggle-btn"><div id="ico-srch"></div></button>
            <input id="sinput" type="search" placeholder="Suchen…" autocomplete="off" autocorrect="off" spellcheck="false">
            <button id="sclr"><div id="ico-xc"></div></button>
          </div>
          <div class="fr-divider"></div>
          <div id="frow"></div>
        </div>
        <div id="fbadges"></div>
      </div>
      <div id="pl"></div>
    </div>
    <div class="view" id="view-plan"><div id="plan"></div></div>
    <div class="view" id="view-touren"><div id="touren"></div></div>
  </div>
  <nav id="tabs">
    <button class="tab" data-v="touren"><div id="ico-route"></div>Touren</button>
    <button class="tab on" data-v="discover"><div id="ico-map"></div>Orte</button>
    <button class="tab" data-v="plan"><div id="ico-cal"></div>Planung</button>
  </nav>
</div>

<div id="ov">
  <div class="sheet" id="ov-sheet">
    <div class="sdl"></div>
    <div class="shn" id="shname"></div>

    <div class="dprow" id="dp"></div>
    <div class="ssec">Uhrzeit <span class="ssec-opt">optional</span></div>
    <div class="time-picker-row">
      <input type="time" id="time-input" class="time-native" step="300">
      <button id="time-clear" class="time-clear-btn">Löschen</button>
    </div>
    <button id="br">Aus Planung entfernen</button>

/* ── FIREBASE REST SYNC (no external scripts) ── */
const DB='https://sylt26-6dbc1-default-rtdb.europe-west1.firebasedatabase.app';
let _syncCode='SYLT26',_evSource=null,_lastWrite=0,_writeTimer=null;

function setSyncStatus(s){}

function dbUrl(){return DB+'/reise/'+_syncCode+'/state.json';}

function fbWrite(){
  clearTimeout(_writeTimer);
  _writeTimer=setTimeout(()=>{
    _lastWrite=Date.now();
    fetch(dbUrl(),{method:'PUT',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(S)})
      .then(()=>setSyncStatus('ok'))
      .catch(()=>setSyncStatus('err'));
  },400);
}

function fbListen(){
  if(_evSource)_evSource.close();
  try{
    _evSource=new EventSource(dbUrl());
    _evSource.addEventListener('put',e=>{
      try{
        const d=JSON.parse(e.data);
        if(Date.now()-_lastWrite<2000)return;
        if(!d||!d.data)return;
        if(JSON.stringify(d.data)===JSON.stringify(S))return; // unverändert — UI nicht anfassen
        S=d.data;
        if(!S.visited)S.visited={};
        if(!S.assigned)S.assigned={};
        if(!S.order)S.order={};if(!S.tourDone)S.tourDone={};
        renderAll();setSyncStatus('ok');
      }catch(err){}
    });
    _evSource.onerror=()=>setSyncStatus('err');
  }catch(e){setSyncStatus('err');}
}

function fbInit(code){
  _syncCode=code;
  fetch(dbUrl()).then(r=>r.json()).then(data=>{
    if(data&&typeof data==='object'&&data.visited!==undefined){
      S=data;
      if(!S.visited)S.visited={};
      if(!S.assigned)S.assigned={};
      if(!S.order)S.order={};if(!S.tourDone)S.tourDone={};
      if(!S.assigned.checkin)S.assigned.checkin={day:'sa',hour:'15',minute:'00'};
      if(!S.assigned.checkout)S.assigned.checkout={day:'do',hour:'11',minute:'00'};
      P.forEach(p=>{if(p.pd&&!S.assigned[p.id])S.assigned[p.id]={day:p.pd,hour:p.phour||'',minute:p.pminute||''};});
    }else{
      fetch(dbUrl(),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(S)});
    }
    renderAll();setSyncStatus('ok');
    fbListen();
  }).catch(()=>{setSyncStatus('err');fbListen();});
}

function showShell(){
  const cs=document.getElementById('code-screen');if(cs)cs.style.display='none';
  const sh=document.getElementById('shell');if(sh)sh.style.display='flex';
}

// Reconnect + refresh when returning to the app (iOS kills EventSource in background)
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState!=='visible')return;
  fetch(dbUrl()).then(r=>r.json()).then(data=>{
    if(data&&typeof data==='object'&&data.visited!==undefined){
      if(Date.now()-_lastWrite<2000)return;
      if(JSON.stringify(data)===JSON.stringify(S)){setSyncStatus('ok');return;} // nichts geändert — UI unangetastet lassen
      S=data;
      if(!S.visited)S.visited={};
      if(!S.assigned)S.assigned={};
      if(!S.order)S.order={};if(!S.tourDone)S.tourDone={};
      renderAll();setSyncStatus('ok');
    }
  }).catch(()=>{});
  fbListen(); // rebuild the EventSource connection
});

function initSync(){
  loadS();renderAll();showShell();
  const urlCode=new URLSearchParams(location.search).get('code')||'';
  const savedCode=localStorage.getItem('sylt26_code')||'';
  const code=(urlCode||savedCode||'SYLT26').toUpperCase().trim().replace(/[^A-Z0-9]/g,'')||'SYLT26';
  localStorage.setItem('sylt26_code',code);
  fbInit(code);
}

/* ── STATE ── */
let S={visited:{},assigned:{},order:{}};
function loadS(){
  try{S=JSON.parse(localStorage.getItem('sylt26v9')||'{}');if(!S.visited)S.visited={};if(!S.assigned)S.assigned={};if(!S.order)S.order={};if(!S.tourDone)S.tourDone={};}catch(e){}
  P.forEach(p=>{if(p.pd&&!S.assigned[p.id])S.assigned[p.id]={day:p.pd,hour:p.phour||'',minute:p.pminute||''};});
  // Fixed items always assigned
  if(!S.assigned['checkin'])S.assigned['checkin']={day:'sa',hour:'15',minute:'00'};
  if(!S.assigned['checkout'])S.assigned['checkout']={day:'do',hour:'11',minute:'00'};
}
function saveS(){try{localStorage.setItem('sylt26v9',JSON.stringify(S));}catch(e){}fbWrite();}

function getDayOrder(dayId){
  const assignedIds=P.filter(p=>S.assigned[p.id]?.day===dayId).map(p=>p.id);
  // If no manual order stored, or has new items, use chronological sort
  let order=(S.order[dayId]||[]).filter(id=>assignedIds.includes(id));
  const missing=assignedIds.filter(id=>!order.includes(id));
  if(missing.length){
    // Sort all (order + missing) chronologically
    const all=[...order,...missing];
    all.sort((a,b)=>{
      const ta=S.assigned[a],tb=S.assigned[b];
      const va=ta?.hour?ta.hour+(ta.minute||'00'):'99';
      const vb=tb?.hour?tb.hour+(tb.minute||'00'):'99';
      return va.localeCompare(vb);
    });
    order=all;
  }
  S.order[dayId]=order;
  return order.map(id=>P.find(p=>p.id===id)).filter(Boolean);
}

const Circ=2*Math.PI*11;
let _lastBadgeN=null;
function updateBadge(){
  // Count real places that are planned (exclude fixed checkin/checkout)
  const realP=P.filter(p=>!p.fixed&&p.c!=='einkaufen');
  const n=realP.filter(p=>S.assigned[p.id]).length;
  const total=realP.length;
  const pc=document.getElementById('pc');
  pc.textContent=n+' / '+total;
  if(_lastBadgeN!==null&&_lastBadgeN!==n){
    pc.classList.remove('badge-pulse');void pc.offsetWidth;
    pc.classList.add('badge-pulse');
  }
  _lastBadgeN=n;
  document.getElementById('prr').style.strokeDashoffset=Circ*(1-n/total);
}

const sinput=document.getElementById('sinput');
const sclr=document.getElementById('sclr');
const searchToggle=document.getElementById('search-toggle');
const sbar=document.getElementById('sbar');
const frow=document.getElementById('frow');
sinput.addEventListener('input',()=>{qStr=sinput.value;sclr.classList.toggle('vis',!!qStr);renderDiscover();});
sclr.onclick=()=>{sinput.value='';qStr='';sclr.classList.remove('vis');sinput.focus();renderDiscover();};

function openSearch(){
  sbar.classList.add('open');
  frow.classList.add('hidden');
  sinput.focus();
}
function closeSearch(){
  // Full close: clears the query and results
  if(!sbar.classList.contains('open'))return;
  sbar.classList.remove('open');
  frow.classList.remove('hidden');
  sinput.value='';qStr='';sclr.classList.remove('vis');sinput.blur();
  renderDiscover();
}
function collapseSearch(){
  // Soft collapse: hides the input but KEEPS the active query/results
  if(!sbar.classList.contains('open'))return;
  if(qStr){
    // Query active — just blur keyboard, keep bar open so user sees context
    sinput.blur();
    return;
  }
  // No query — full close
  closeSearch();
}
searchToggle.onclick=()=>{
  if(sbar.classList.contains('open'))closeSearch();
  else openSearch();
};
// On scroll: soft collapse (keeps search results visible)
window.addEventListener('scroll',()=>collapseSearch(),{passive:true});
// Tap outside: soft collapse too
document.addEventListener('pointerdown',e=>{
  if(!sbar.classList.contains('open'))return;
  if(sbar.contains(e.target))return;
  collapseSearch();
});

function buildDetActs(p,container){
  container.innerHTML='';
  const acts=[];
  if(['restaurant','cafe','einkaufen'].includes(p.c))
    acts.push({l:'Google',i:'srch',cls:'',fn:()=>openExternal('https://www.google.com/search?q='+encodeURIComponent(p.n+' Sylt'))});
  if(p.m)acts.push({l:'Maps',i:'pin',cls:'det-maps2',fn:()=>openMaps(p.m)});
  if(p.w)acts.push({l:'Website',i:'globe',cls:'det-web',fn:()=>openExternal(p.w)});
  if(p.p)acts.push({l:'Anrufen',i:'phone',cls:'det-phone',fn:()=>{location.href='tel:+49'+p.p.replace(/\D/g,'').slice(1);}});
  if(!acts.length)return;
  const n=acts.length;
  const mk=(a,mode)=>{ // mode: 'primary' | 'text' | 'icon'
    const cls=(mode==='primary'?'det-google':a.cls||'det-maps2')+(mode==='icon'?' det-ico':mode==='icon2'?' det-ico2':'');
    const b=el('button','det-act '+cls);
    const withIcon=(a.i==='pin'||a.i==='phone'); // Maps & Anrufen: Icon+Text wenn breit
    if(mode==='icon'||mode==='icon2')b.innerHTML=svg(a.i,a.i==='phone'?20:21,2);
    else if(withIcon)b.innerHTML=svg(a.i,a.i==='phone'?15:16,2)+' '+a.l;
    else b.textContent=a.l;
    b.onclick=e=>{e.stopPropagation();a.fn();};
    container.appendChild(b);
  };
  if(n<=2){
    mk(acts[0],'primary');
    if(acts[1])mk(acts[1],'text');
  }else if(n===3&&acts[2].i==='phone'&&!acts.some(a=>a.i==='globe')){
    mk(acts[0],'primary');mk(acts[1],'text');mk(acts[2],'icon');
  }else if(n===3){
    // Google = 50 %, zwei Icons teilen die rechte Hälfte
    mk(acts[0],'primary');mk(acts[1],'icon2');mk(acts[2],'icon2');
  }else{
    mk(acts[0],'primary');
    for(let i=1;i<n;i++)mk(acts[i],'icon');
  }
}

function makeFilterChip(label,isOn,extraClass,onToggle){
  const b=el('button','chip'+(extraClass?' '+extraClass:'')+(isOn?' on':''));
  const lbl=el('span','',label);
  b.appendChild(lbl);
  if(isOn){
    const x=el('span','chip-x','×');
    x.onclick=e=>{e.stopPropagation();onToggle(true);};
    b.appendChild(x);
  }
  b.onclick=()=>onToggle(false);
  return b;
}

/* ── MAKE CARD ── */
function priceLabel(p){
  const eu=(p.t||[]).find(t=>/€/.test(t));
  if(eu)return eu;
  if((p.t||[]).includes('kostenlos'))return'Kostenlos';
  if((p.t||[]).includes('Günstig'))return'Günstig';
  if((p.t||[]).includes('Strandgebühr'))return'Strandgebühr';
  return null;
}
function cleanDist(p){
  let s=p.dist||'';
  s=s.replace(/\s*·\s*Zu Fuß$/,'').replace(/\s*Rad$/,'').replace(/^RE\s*·\s*/,'');
  return s.trim();
}
const MODE_LABEL={fuss:'Zu Fuß',rad:'Fahrrad',bus:'Bus',re:'RE'};
function distValue(p){
  const s=p.dist||'';
  const kmMatch=s.match(/(\d+)\s*km/);
  const minMatch=s.match(/(~?)(\d+)\s*min/i);
  const parts=[];
  if(kmMatch)parts.push(kmMatch[1]+' km');
  if(minMatch)parts.push(minMatch[1]+minMatch[2]+' Min.');
  if(!parts.length)parts.push(cleanDist(p));
  return parts.join('<span class="pipe-sep"> | </span>')+' ('+MODE_LABEL[p.tr]+')';
}

function makeCard(p,hideAsgnBadge=false){

  const card=el('div','card'+(isDone?' done':''));card.dataset.cat=p.c;

  // Meta: cat chip + location(region) + highlight star
  const meta=el('div','cc-meta');
  meta.appendChild(el('span','cat-chip ch-'+p.c,CAT_L[p.c]));
  meta.appendChild(el('span','loc-label',locLabel(p.loc)));
  if(p.hl){const sp=el('span','hl-pill');sp.innerHTML=starIcon(10);meta.appendChild(sp);}
  if(asgn&&!hideAsgnBadge){const d=DAYS.find(d=>d.id===asgn.day);const tm=asgn.hour?(asgn.hour+':'+(asgn.minute||'00')):'';meta.appendChild(el('span','asgn-badge',(d?.s||'')+(tm?' · '+tm:'')));}
  left.appendChild(meta);

  left.appendChild(el('div','cc-name',p.n));

  // Subtitle — max 2 lines, no chevron

  // Right: single + button
  const right=el('div','cc-right');

  pb.innerHTML=svg('plus',19,2);
  pb.onclick=e=>{e.stopPropagation();openSheet(p.id);};
  right.appendChild(pb);

  cc.append(left,right);
  wrap.dataset.pid=p.id;
  cc.addEventListener('click',()=>{
    const isOpen=wrap.classList.contains('open');
    if(openCardWrap&&openCardWrap!==wrap)openCardWrap.classList.remove('open');
    wrap.classList.toggle('open',!isOpen);

function attachPlanSwipe(wrap,p){
  if(p.fixed)return; // fixed items can't be deleted
  const r=wrap.querySelector('.pr');
  const behind=wrap.querySelector('.pr-behind');
  const THRESH=72,OPEN_X=-88;
  let sx=0,sy=0,drag=false,dir=null,isOpen=false;

  function snap(){
    r.style.transition='transform .35s var(--spring)';
    r.style.transform='translateX(0)';
    if(behind){behind.style.opacity='0';behind.style.pointerEvents='none';}
    isOpen=false;
  }
  function openPanel(){
    r.style.transition='transform .32s var(--spring)';
    r.style.transform=`translateX(${OPEN_X}px)`;
    if(behind){behind.style.opacity='1';behind.style.pointerEvents='all';}
    isOpen=true;
  }

  // Tap on red behind panel → confirm delete
  if(behind){
    behind.style.pointerEvents='none';
    behind.addEventListener('click',()=>{
      r.style.transition='transform .28s ease';
      r.style.transform='translateX(-110%)';
      setTimeout(()=>removePlanItem(p),260);
    });
  }

  // Tap elsewhere when open → snap back
  document.addEventListener('pointerdown',e=>{
    if(!isOpen)return;
    if(wrap.contains(e.target))return;
    snap();
  });

  r.addEventListener('touchstart',e=>{
    if(e.target.closest('button'))return;
    if(isOpen){snap();return;}
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;drag=true;dir=null;
    r.style.transition='none';
  },{passive:true});
  r.addEventListener('touchmove',e=>{
    if(!drag)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(dir===null){if(Math.abs(dx)<6&&Math.abs(dy)<6)return;dir=Math.abs(dx)>Math.abs(dy)*1.2?'h':'v';}
    if(dir==='v')return;
    e.preventDefault();
    const x=Math.max(-110,Math.min(0,dx));
    r.style.transform=`translateX(${x}px)`;
    if(behind)behind.style.opacity=Math.min(1,Math.max(0,-x/THRESH));
  },{passive:false});
  r.addEventListener('touchend',e=>{
    if(!drag||dir!=='h'){drag=false;return;}drag=false;
    const dx=e.changedTouches[0].clientX-sx;
    if(dx<-THRESH)openPanel();
    else snap();
  });
  r.addEventListener('touchcancel',()=>{drag=false;snap();});
}

function attachDragHandle(wrap,container,dayId){
  const handle=wrap.querySelector('.pr-handle');
  const innerRow=wrap.querySelector('.pr');
  let startY=0,dragging=false;
  handle.addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;dragging=true;
    wrap.style.position='relative';wrap.style.zIndex='50';wrap.style.transition='none';
    if(innerRow)innerRow.classList.add('dragging-row');
  },{passive:true});
  handle.addEventListener('touchmove',e=>{
    if(!dragging)return;
    e.preventDefault();
    const y=e.touches[0].clientY;
    wrap.style.transform=`translateY(${y-startY}px)`;
    const rect=wrap.getBoundingClientRect();
    const center=rect.top+rect.height/2;
    const siblings=Array.from(container.querySelectorAll('.pr-wrap'));
    const idx=siblings.indexOf(wrap);
    if(y-startY<0&&idx>0){
      const prev=siblings[idx-1],pr=prev.getBoundingClientRect();
      if(center<pr.top+pr.height/2){container.insertBefore(wrap,prev);startY=y;wrap.style.transform='translateY(0px)';}
    } else if(y-startY>0&&idx<siblings.length-1){
      const next=siblings[idx+1],nr=next.getBoundingClientRect();
      if(center>nr.top+nr.height/2){container.insertBefore(next,wrap);startY=y;wrap.style.transform='translateY(0px)';}
    }
  },{passive:false});
  function end(){
    if(!dragging)return;dragging=false;
    wrap.style.transition='';wrap.style.transform='';wrap.style.zIndex='';wrap.style.position='';
    if(innerRow)innerRow.classList.remove('dragging-row');
    const ids=Array.from(container.querySelectorAll('.pr')).map(el=>el.dataset.id);
    S.order[dayId]=ids;saveS();
  }
  handle.addEventListener('touchend',end);
  handle.addEventListener('touchcancel',end);
}

/* ── DRAG-TO-DISMISS for sheets ── */

let _lockScrollY=0;
function lockBody(){
  if(document.body.classList.contains('sheet-open'))return;
  _lockScrollY=window.scrollY;
  document.body.style.top=(-_lockScrollY)+'px';
  lockBody();
}
function unlockBody(){
  if(!document.body.classList.contains('sheet-open'))return;
  unlockBody();
  document.body.style.top='';
  window.scrollTo(0,_lockScrollY);
}
function makeDraggable(sheetEl,overlayEl,closeFn){
  let startY=0,curY=0,dragging=false;
  let lastY=0,lastT=0,vel=0;
  function setBackdrop(p){ // p: 0 = fully open, 1 = fully dragged away
    if(!overlayEl)return;
    overlayEl.style.background=`rgba(0,0,0,${(0.48*(1-p)).toFixed(3)})`;
  }
  function resetBackdrop(){if(overlayEl)overlayEl.style.background='';}
  sheetEl.addEventListener('touchstart',e=>{
    if(sheetEl.scrollTop>0)return; // only when scrolled to top
    if(e.target.closest('.dprow'))return; // pills row: horizontal scroll only
    startY=e.touches[0].clientY;dragging=true;curY=0;
    lastY=startY;lastT=e.timeStamp;vel=0;
    sheetEl.classList.add('dragging');
  },{passive:true});
  sheetEl.addEventListener('touchmove',e=>{
    if(!dragging)return;
    const y=e.touches[0].clientY;
    const dy=y-startY;
    // velocity (px/ms), smoothed
    const dt=e.timeStamp-lastT;
    if(dt>0){vel=0.7*vel+0.3*((y-lastY)/dt);}
    lastY=y;lastT=e.timeStamp;
    if(dy<0){
      // User scrolls sheet content down — hand back to native scroll if scrollable
      if(sheetEl.scrollHeight>sheetEl.clientHeight+2){
        dragging=false;sheetEl.classList.remove('dragging');
        sheetEl.style.transform='';resetBackdrop();curY=0;
        return;
      }
      // Not scrollable: rubber-band upward with resistance
      e.preventDefault();
      curY=dy/3.2;
      sheetEl.style.transform=`translateY(${curY}px)`;
      return;
    }
    // Dragging sheet down: take over the gesture completely
    e.preventDefault();
    curY=dy;
    sheetEl.style.transform=`translateY(${curY}px)`;
    // Backdrop follows drag position
    setBackdrop(Math.min(1,curY/(sheetEl.offsetHeight||400)));
  },{passive:false});
  sheetEl.addEventListener('touchend',()=>{
    if(!dragging)return;dragging=false;
    sheetEl.classList.remove('dragging');
    resetBackdrop();
    // Velocity-based dismiss: fast flick closes regardless of distance
    const flick=vel>0.5&&curY>20;
    if(curY>110||flick){ sheetEl.style.transform='';closeFn(); }
    else{ sheetEl.style.transform=''; }
    curY=0;vel=0;
  });
  sheetEl.addEventListener('touchcancel',()=>{
    if(!dragging)return;dragging=false;
    sheetEl.classList.remove('dragging');
    sheetEl.style.transform='';resetBackdrop();curY=0;vel=0;
  });
}

// iOS: prevent background scroll via touchmove on overlay backdrops
['ov','fov','tov','iov'].forEach(id=>{
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('touchmove',e=>{
    // Allow moves inside the sheet (it scrolls internally); block on backdrop
    if(!e.target.closest('.sheet'))e.preventDefault();
  },{passive:false});
});

makeDraggable(document.getElementById('ov-sheet'),ov,closeSheet);
makeDraggable(document.getElementById('tov-sheet'),tov,closeTourSheet);

/* ── INFO SHEET ── */
const iov=document.getElementById('iov');
function openInfoSheet(id, showDayPicker=false){
  const p=P.find(x=>x.id===id);
  document.getElementById('iov-name').textContent=p.n;
  document.getElementById('iov-feel').textContent=p.feel||'';
  // Day picker section
  const daySection=document.getElementById('iov-day-section');
  if(showDayPicker){
    daySection.style.display='';
    const dp=document.getElementById('iov-dp');dp.innerHTML='';
    const ex=S.assigned[id];
    let curDay=ex?.day||null;
    DAYS.forEach(d=>{
      const b=el('button','pbtn'+(d.sp?' sp':'')+(curDay===d.id?' on':''),d.s+(d.sp?' ♥':''));
      b.onclick=()=>{
        curDay=d.id;
        dp.querySelectorAll('.pbtn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
        if(S.assigned[id])S.assigned[id].day=curDay;
        else S.assigned[id]={day:curDay,hour:'',minute:''};
        saveS();renderPlan();updateBadge();
      };
      dp.appendChild(b);
    });
  } else {
    daySection.style.display='none';
  }
  const il=document.getElementById('iov-info');il.innerHTML='';
  const reservNeeded=(p.t||[]).some(t=>/reservier/i.test(t));
  if(p.hours){const row=el('div','info-row');row.appendChild(el('span','info-label','Öffnungszeiten'));row.appendChild(el('span','info-value',p.hours+(reservNeeded?' | Reservieren!':'')));il.appendChild(row);}
  const price=priceLabel(p);
  if(price){const row=el('div','info-row');row.appendChild(el('span','info-label','Preis'));row.appendChild(el('span','info-value',price));il.appendChild(row);}
  if(p.dist){const row=el('div','info-row');row.appendChild(el('span','info-label','Vom Hotel'));row.appendChild(el('span','info-value',distValue(p)));il.appendChild(row);}
  const acts=document.getElementById('iov-acts');
  buildDetActs(p,acts);
  iov.classList.add('on');lockBody();
}
function closeInfoSheet(){iov.classList.remove('on');unlockBody();}
iov.addEventListener('click',e=>{if(e.target===iov)closeInfoSheet();});
makeDraggable(document.getElementById('iov-sheet'),iov,closeInfoSheet);
